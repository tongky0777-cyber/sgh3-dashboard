<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수경수학학원 유병학T 학부모 확인</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --ink:#1a1a2e;--ink2:#3a3a5c;--muted:#888;--bg:#f7f7fa;--white:#fff;--line:#e8e8f0;
  --red:#c0392b;--red-bg:#fdf0ef;--green:#1a6b3a;--green-bg:#edf7f1;
  --gold:#8a6820;--gold-bg:#fdf8ee;--blue:#1c3c6e;--blue-bg:#eef3fb;
  --purple:#5b2d8e;--purple-bg:#f3eefb;
  --navy:#1a1a2e;--sans:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:14px;line-height:1.6;}
.top-bar{background:var(--navy);color:#fff;padding:14px 20px;display:flex;align-items:center;gap:10px;}
.top-bar .logo{font-size:13px;font-weight:700;opacity:.9;}
.top-bar .badge{font-size:10px;background:rgba(255,255,255,.15);padding:2px 8px;border-radius:100px;margin-left:auto;}
.wrap{max-width:640px;margin:0 auto;padding:20px 16px 60px;}
.student-card{background:var(--white);border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid var(--line);}
.student-name{font-size:20px;font-weight:700;color:var(--ink);}
.student-meta{font-size:12px;color:var(--muted);margin-top:4px;}
.section{background:var(--white);border-radius:12px;padding:20px;margin-bottom:12px;border:1px solid var(--line);}
.section-title{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:6px;}
.section-title::before{content:'';display:inline-block;width:3px;height:12px;background:var(--navy);border-radius:2px;}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.stat-box{background:var(--bg);border-radius:8px;padding:12px;text-align:center;}
.stat-val{font-size:22px;font-weight:700;color:var(--ink);}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px;}
.hw-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);}
.hw-item:last-child{border-bottom:none;}
.hw-name{flex:1;font-size:13px;color:var(--ink2);}
.hw-due{font-size:11px;color:var(--muted);white-space:nowrap;}
.tag{font-size:11px;font-weight:700;padding:3px 8px;border-radius:100px;white-space:nowrap;}
.tag-pending{background:var(--red-bg);color:var(--red);}
.tag-done{background:var(--green-bg);color:var(--green);}
.tag-half{background:var(--gold-bg);color:var(--gold);}
.test-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);}
.test-item:last-child{border-bottom:none;}
.test-name{flex:1;font-size:13px;color:var(--ink2);}
.test-score{font-size:16px;font-weight:700;}
.test-date{font-size:11px;color:var(--muted);}
.att-grid{display:flex;flex-wrap:wrap;gap:5px;}
.att-dot{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
.att-o{background:var(--green-bg);color:var(--green);}
.att-x{background:var(--red-bg);color:var(--red);}
.att-e{background:var(--blue-bg);color:var(--blue);}
.att-t{background:var(--gold-bg);color:var(--gold);}
.att-date{font-size:9px;text-align:center;color:var(--muted);margin-top:1px;}
.att-wrap{display:flex;flex-direction:column;align-items:center;}
.prog-item{padding:10px 0;border-bottom:1px solid var(--line);}
.prog-item:last-child{border-bottom:none;}
.prog-book{font-size:13px;font-weight:700;color:var(--ink);}
.prog-unit{font-size:12px;color:var(--ink2);margin-top:2px;}
.prog-meta{font-size:11px;color:var(--muted);margin-top:3px;}
.schedule-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);}
.schedule-item:last-child{border-bottom:none;}
.schedule-date{font-size:12px;font-weight:700;color:var(--purple);white-space:nowrap;min-width:52px;}
.schedule-info{flex:1;}
.schedule-content{font-size:13px;color:var(--ink2);}
.schedule-time{font-size:11px;color:var(--muted);margin-top:2px;}
.schedule-done{font-size:11px;font-weight:700;padding:2px 7px;border-radius:100px;white-space:nowrap;background:var(--green-bg);color:var(--green);}
.schedule-upcoming{font-size:11px;font-weight:700;padding:2px 7px;border-radius:100px;white-space:nowrap;background:var(--purple-bg);color:var(--purple);}
.empty{text-align:center;color:var(--muted);padding:20px;font-size:13px;}
.error-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;text-align:center;padding:20px;}
.error-screen h2{font-size:18px;color:var(--ink);margin-bottom:8px;}
.error-screen p{font-size:13px;color:var(--muted);}
.loading{text-align:center;padding:60px 20px;color:var(--muted);font-size:13px;}

/* (AI 리포트 섹션 CSS 제거됨) */
</style>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
</head>
<body>

<div class="top-bar">
  <div class="logo">수경수학학원 유병학T</div>
  <div class="badge">학부모 전용</div>
</div>

<div class="wrap" id="app">
  <div class="loading">불러오는 중..</div>
  </div>
<div id="exam-section" style="max-width:640px;margin:0 auto;padding:0 16px 60px;"></div>
</div>

<script>
var firebaseConfig = {
  apiKey: "AIzaSyDfQxi6q8xVUVgnvwON446Lnd-Becpwvbk",
  authDomain: "kimbjmath.firebaseapp.com",
  databaseURL: "https://kimbjmath-default-rtdb.firebaseio.com",
  projectId: "kimbjmath",
  storageBucket: "kimbjmath.firebasestorage.app",
  messagingSenderId: "664889936709",
  appId: "1:664889936709:web:2df1494b0cd978c64e4c2c"
};
firebase.initializeApp(firebaseConfig);
var rtdb = firebase.database();

function getParam(name){
  return new URLSearchParams(window.location.search).get(name);
}

function render(){
  var sid = getParam('id');
  var app = document.getElementById('app');

  if(!sid){
    app.innerHTML = '<div class="error-screen"><h2>학생이 없습니다</h2><p>학부모 링크를 다시 확인해주세요.</p></div>';
    return;
  }

  var keys = ['students','attendance','homework','tests','schedules','progress'];
  var data = {};
  var loaded = 0;

  keys.forEach(function(key){
    rtdb.ref('sgh3_' + key).once('value', function(snap){
      var val = snap.val();
      if(!val){
        data[key] = [];
      } else if(Array.isArray(val)){
        data[key] = val;
      } else if(typeof val === 'object'){
        data[key] = Object.values(val);
      } else {
        data[key] = [];
      }
      loaded++;
      if(loaded === keys.length) renderData(sid, data, app);
    }, function(err){
      data[key] = [];
      loaded++;
      if(loaded === keys.length) renderData(sid, data, app);
    });
  });
}

function renderData(sid, data, app){
  var students = data.students || [];
  var student = students.find(function(s){ return s && s.id === sid; });

  if(!student){
    app.innerHTML = '<div class="error-screen"><h2>학생 정보를 찾을 수 없습니다</h2><p>링크가 올바른지 확인해주세요.</p></div>';
    return;
  }

  var threeMonthsAgo = new Date();
  threeMonthsAgo.setMonth(threeMonthsAgo.getMonth() - 3);
  var threeMonthsAgoStr = threeMonthsAgo.toISOString().slice(0,10);
  var today = new Date().toISOString().slice(0,10);

  var attendance = (data.attendance || []).filter(function(a){ return a && a.sid === sid && a.date >= threeMonthsAgoStr; }).sort(function(a,b){ return b.date.localeCompare(a.date); });
  var homework = (data.homework || []).filter(function(h){ return h && h.sid === sid; }).sort(function(a,b){ return b.due.localeCompare(a.due); });
  var tests = (data.tests || []).filter(function(t){ return t && t.sid === sid; }).sort(function(a,b){ return b.date.localeCompare(a.date); });

  // 최근 진도 2개
  var progress = (data.progress || []).filter(function(p){
    return p && p.sid === sid;
  }).sort(function(a,b){ return b.date.localeCompare(a.date); }).slice(0,2);

  // 보강 일정: target이 학생 이름과 일치하는 것
  var schedules = (data.schedules || []).filter(function(s){
    return s && s.target && s.target.indexOf(student.name) !== -1;
  }).sort(function(a,b){ return b.date.localeCompare(a.date); });

  var attO = attendance.filter(function(a){ return a.status==='O'; }).length;
  var hwDone = homework.filter(function(h){ return h.status==='done'; }).length;
  var testAvg = tests.length ? Math.round(tests.reduce(function(s,t){ return s+t.score; },0)/tests.length) : null;

  var attStatusLabel = {O:'출석',X:'결석',E:'조퇴',T:'지각',B:'보강'};
  var attStatusClass = {O:'att-o',X:'att-x',E:'att-e',T:'att-t',B:'att-t'};
  var hwStatusLabel = {pending:'미제출',done:'제출',half:'일부제출'};
  var hwStatusClass = {pending:'tag-pending',done:'tag-done',half:'tag-half'};

  // (월간 리포트 관련 계산 제거됨)

  var html = '';

  // 학생 카드
  html += '<div class="student-card">'
    + '<div class="student-name">'+student.name+'</div>'
    + '<div class="student-meta">'+student.grade+' · '+(student.school||'')+(student.class?' · '+student.class:'')+'</div>'
    + '</div>';

  // (월간 리포트 섹션 제거됨)

  // 요약 통계
  html += '<div class="section">'
    + '<div class="section-title">요약</div>'
    + '<div class="stat-row">'
    + '<div class="stat-box"><div class="stat-val">'+attO+'</div><div class="stat-label">출석 (3개월)</div></div>'
    + '<div class="stat-box"><div class="stat-val">'+hwDone+'</div><div class="stat-label">제출 숙제</div></div>'
    + '<div class="stat-box"><div class="stat-val">'+(testAvg!==null?testAvg+'점':'–')+'</div><div class="stat-label">평균 점수</div></div>'
    + '</div>'
    + '</div>';

  // 최근 진도
  html += '<div class="section"><div class="section-title">최근 진도</div>';
  if(!progress.length){
    html += '<div class="empty">진도 데이터가 없습니다</div>';
  } else {
    progress.forEach(function(p){
      html += '<div class="prog-item">'
        + '<div class="prog-book">'+p.book+(p.unit?' · '+p.unit:'')+'</div>'
        + (p.range?'<div class="prog-unit">범위: '+p.range+'</div>':'')
        + '<div class="prog-meta">'+p.date+(p.groupName?' · '+p.groupName:'')+'</div>'
        + '</div>';
    });
  }
  html += '</div>';

  // 보강 일정
  html += '<div class="section"><div class="section-title">보강 일정</div>';
  if(!schedules.length){
    html += '<div class="empty">보강 일정이 없습니다</div>';
  } else {
    schedules.slice(0,10).forEach(function(s){
      var isDone = s.done || s.date < today;
      var statusTag = isDone
        ? '<span class="schedule-done">완료</span>'
        : '<span class="schedule-upcoming">예정</span>';
      html += '<div class="schedule-item">'
        + '<div class="schedule-date">'+s.date.slice(5)+'</div>'
        + '<div class="schedule-info">'
        + '<div class="schedule-content">'+(s.content||'보강')+'</div>'
        + (s.time ? '<div class="schedule-time">'+s.time+'</div>' : '')
        + '</div>'
        + statusTag
        + '</div>';
    });
  }
  html += '</div>';

  // 출결
  html += '<div class="section"><div class="section-title">출결 현황</div>';
  if(!attendance.length){
    html += '<div class="empty">출결 데이터가 없습니다</div>';
  } else {
    html += '<div class="att-grid">';
    attendance.slice(0,30).forEach(function(a){
      html += '<div class="att-wrap">'
        + '<div class="att-dot '+(attStatusClass[a.status]||'att-o')+'">'+(attStatusLabel[a.status]||a.status)+'</div>'
        + '<div class="att-date">'+a.date.slice(5)+'</div>'
        + '</div>';
    });
    html += '</div>';
  }
  html += '</div>';

  // 숙제
  html += '<div class="section"><div class="section-title">숙제 현황</div>';
  if(!homework.length){
    html += '<div class="empty">숙제 데이터가 없습니다</div>';
  } else {
    homework.slice(0,10).forEach(function(h){
      html += '<div class="hw-item">'
        + '<div class="hw-name">'+h.name+'</div>'
        + '<div class="hw-due">마감 '+h.due.slice(5)+'</div>'
        + '<span class="tag '+(hwStatusClass[h.status]||'tag-pending')+'">'+(hwStatusLabel[h.status]||'미제출')+'</span>'
        + '</div>';
    });
  }
  html += '</div>';

  // 테스트
  html += '<div class="section"><div class="section-title">테스트 결과</div>';
  if(!tests.length){
    html += '<div class="empty">테스트 데이터가 없습니다</div>';
  } else {
    tests.forEach(function(t){
      var scoreColor = t.score>=90?'var(--green)':t.score>=70?'var(--gold)':'var(--red)';
      html += '<div class="test-item">'
        + '<div class="test-name">'+t.name+'</div>'
        + '<div style="text-align:right;">'
        + '<div class="test-score" style="color:'+scoreColor+'">'+t.score+'점</div>'
        + '<div class="test-date">'+t.date+'</div>'
        + '</div>'
        + '</div>';
    });
  }
  html += '</div>';

  app.innerHTML = html;
}

render();

// (AI 리포트 자동생성 기능 제거됨 — 선생님이 대시보드에서 저장한 리포트만 표시)
</script>
<script>
(function(){
  var FBCONFIG={apiKey:"AIzaSyDfQxi6q8xVUVgnvwON446Lnd-Becpwvbk",databaseURL:"https://kimbjmath-default-rtdb.firebaseio.com",projectId:"kimbjmath",appId:"1:664889936709:web:2df1494b0cd978c64e4c2c"};
  if(!firebase.apps.length)firebase.initializeApp(FBCONFIG);
  var db=firebase.database();
  var params=new URLSearchParams(window.location.search);
  var sid=params.get('id');
  if(!sid)return;
  db.ref('sgh3_exam_files').once('value',function(snap){
    var val=snap.val();
    if(!val)return;
    var groupIds=[];
    try{
      var raw=localStorage.getItem('sgh3_groups');
      if(raw){
        var groups=JSON.parse(raw);
        groups.forEach(function(g){if((g.students||[]).includes(sid))groupIds.push(g.id);});
      }
    }catch(e){}
    var exams=Object.values(val).filter(function(e){return e&&(e.targetId===sid||groupIds.includes(e.targetId));}).sort(function(a,b){return b.date.localeCompare(a.date);});
    if(!exams.length)return;
    var wrap=document.getElementById('exam-section')||document.body;
    var sec=document.createElement('div');
    sec.className='section';
    sec.innerHTML='<div class="section-title"><span>📄</span> 시험지</div>'+
      exams.map(function(e){
        return '<div style="border:1px solid var(--line);border-radius:8px;padding:12px 14px;margin-bottom:8px;">'+
          '<div style="font-size:14px;font-weight:700;margin-bottom:4px;">'+e.title+'</div>'+
          '<div style="font-size:12px;color:var(--muted);margin-bottom:8px;">'+e.date+'</div>'+
          (e.note?'<div style="font-size:12px;background:#f7f7fa;border-radius:6px;padding:8px 10px;margin-bottom:8px;line-height:1.6;">📝 '+e.note+'</div>':'')+
          '<button onclick="viewExam(\''+e.id+'\')" style="background:var(--navy);color:#fff;border:none;border-radius:6px;padding:8px 16px;font-size:13px;cursor:pointer;width:100%;">📄 시험지 보기</button>'+
          '</div>';
      }).join('');
    wrap.appendChild(sec);
    window._examData=exams;
  });
})();
function viewExam(id){
  var exams=window._examData||[];
  var e=exams.find(function(x){return x.id===id;});
  if(!e||!e.base64){alert('시험지 데이터가 없습니다.');return;}
  var w=window.open('','_blank');
  w.document.write('<html><head><title>'+e.title+'</title></head><body style="margin:0"><embed src="'+e.base64+'" type="application/pdf" width="100%" height="100%"></body></html>');
}
</script>
</body>
</html>
